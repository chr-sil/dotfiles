# starting out with this conf

set -g mouse on
set -g default-terminal "screen-256color"

# Status bar
set -g status-style bg=green,fg=black
set -g status-left "[#S] "
set -g status-left-length 20

# Right side: Prefix indicator | Hostname | Date & Time
set -g status-right ' #{?client_prefix,#[fg=white,bg=red,bold] PREFIX #[default],} | #H | %Y-%m-%d %H:%M '


setw -g window-status-current-format "#[fg=white,bg=blue,bold] #I:#W #[default]"
setw -g window-status-format " #I:#W "


# Fix escape time for Nvim
set -s escape-time 0

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Automatic restore on tmux start
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'

# Use vim keys over arrows to move
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R


bind s choose-tree -Zs -O name
